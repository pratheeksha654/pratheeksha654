name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: pratheeksha654
          outputs: |
            outputs: |
  dist/github-contribution-grid-snake.svg?color_snake=#FF66C4&color_dots=#FFF0F6,#FFD6E8,#FFADD2,#FF66C4,#C9184A

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
